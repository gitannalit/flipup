version: "3.9"

services:
  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - VITE_APP_ID=${VITE_APP_ID}
      - OAUTH_SERVER_URL=${OAUTH_SERVER_URL}
      - VITE_OAUTH_PORTAL_URL=${VITE_OAUTH_PORTAL_URL}
      - BUILT_IN_FORGE_API_URL=${BUILT_IN_FORGE_API_URL}
      - BUILT_IN_FORGE_API_KEY=${BUILT_IN_FORGE_API_KEY}
      - VITE_FRONTEND_FORGE_API_KEY=${VITE_FRONTEND_FORGE_API_KEY}
      - VITE_FRONTEND_FORGE_API_URL=${VITE_FRONTEND_FORGE_API_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - olixxia-network

  # ── MySQL Database (intercambiable) ──────────────────────────────────────────
  # Para cambiar a PostgreSQL: reemplaza este servicio por postgres:16-alpine
  # Para SQLite: elimina este servicio y cambia DATABASE_URL a file:./olixxia.db
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-olixxia_root}
      MYSQL_DATABASE: ${DB_NAME:-olixxia}
      MYSQL_USER: ${DB_USER:-olixxia}
      MYSQL_PASSWORD: ${DB_PASSWORD:-olixxia_pass}
    ports:
      - "3306:3306"
    volumes:
      - olixxia_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-olixxia_root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - olixxia-network

  # ── Nginx Reverse Proxy (opcional) ───────────────────────────────────────────
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - olixxia-network

volumes:
  olixxia_db_data:
    driver: local

networks:
  olixxia-network:
    driver: bridge

# ── Para usar PostgreSQL en lugar de MySQL ────────────────────────────────────
# Reemplaza el servicio 'db' con:
#
# db:
#   image: postgres:16-alpine
#   environment:
#     POSTGRES_DB: olixxia
#     POSTGRES_USER: olixxia
#     POSTGRES_PASSWORD: olixxia_pass
#   ports:
#     - "5432:5432"
#   volumes:
#     - olixxia_db_data:/var/lib/postgresql/data
#   healthcheck:
#     test: ["CMD-SHELL", "pg_isready -U olixxia"]
#     interval: 10s
#     timeout: 5s
#     retries: 5
#
# Y actualiza DATABASE_URL a: postgresql://olixxia:olixxia_pass@db:5432/olixxia
